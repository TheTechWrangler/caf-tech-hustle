<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="RAM_pcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2d4e"/>
      <stop offset="100%" stop-color="#0d1830"/>
    </linearGradient>
    <linearGradient id="RAM_pcb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#253557"/>
      <stop offset="100%" stop-color="#111d35"/>
    </linearGradient>
    <linearGradient id="RAM_edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd857"/>
      <stop offset="100%" stop-color="#a87800"/>
    </linearGradient>
  </defs>

  <!-- ══ STICK 1 (back / left, offset slightly behind) ══ -->
  <!-- PCB body -->
  <rect x="16" y="14" width="38" height="82" rx="2"
    fill="url(#RAM_pcb)" stroke="#08111e" stroke-width="1.5"/>
  <!-- Heatspreader top cap -->
  <rect x="14" y="14" width="42" height="12" rx="2"
    fill="#1a2844" stroke="#08111e" stroke-width="1.5"/>
  <line x1="14" y1="14" x2="56" y2="14" stroke="#2ff8ef" stroke-width="1" opacity="0.3"/>

  <!-- Chips on stick 1 (left side) -->
  <rect x="20" y="30" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="20" y="44" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="20" y="58" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>
  <!-- Chips on stick 1 (right side) -->
  <rect x="36" y="30" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="36" y="44" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="36" y="58" width="12" height="9" rx="1.5" fill="#111d35" stroke="#1e2d4e" stroke-width="1"/>

  <!-- Edge connector (gold strip) -->
  <rect x="16" y="90" width="38" height="12" rx="1"
    fill="url(#RAM_edge)"/>
  <!-- Notch in edge connector -->
  <rect x="30" y="90" width="6" height="6" rx="0.5" fill="#0d1527"/>
  <!-- Gold glow on connector -->
  <rect x="16" y="90" width="38" height="12" rx="1"
    fill="none" stroke="#ffd857" stroke-width="1" opacity="0.5"/>

  <!-- ══ STICK 2 (front / right, dominant) ══ -->
  <!-- PCB body -->
  <rect x="72" y="10" width="40" height="84" rx="2"
    fill="url(#RAM_pcb2)" stroke="#08111e" stroke-width="2"/>
  <!-- Heatspreader top cap (slightly taller for visual distinction) -->
  <rect x="70" y="10" width="44" height="14" rx="2"
    fill="#253557" stroke="#08111e" stroke-width="2"/>
  <!-- Cyan top accent on heatspreader -->
  <line x1="70" y1="10" x2="114" y2="10" stroke="#2ff8ef" stroke-width="1.5" opacity="0.5"/>
  <!-- Heatspreader glow -->
  <line x1="70" y1="10" x2="114" y2="10" stroke="#2ff8ef" stroke-width="5"   opacity="0.1"/>

  <!-- Chips on stick 2 (left column) -->
  <rect x="76" y="28" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="76" y="43" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="76" y="58" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>
  <!-- Chips on stick 2 (right column) -->
  <rect x="93" y="28" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="93" y="43" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="93" y="58" width="13" height="10" rx="1.5" fill="#0d1527" stroke="#1e2d4e" stroke-width="1"/>

  <!-- Chip highlight dots (cyan — active memory glow) -->
  <circle cx="82" cy="33" r="2.5" fill="#2ff8ef" opacity="0.7"/>
  <circle cx="82" cy="33" r="5"   fill="#2ff8ef" opacity="0.1"/>
  <circle cx="99" cy="48" r="2.5" fill="#2ff8ef" opacity="0.55"/>
  <circle cx="82" cy="63" r="2.5" fill="#ff5fa2" opacity="0.6"/>
  <circle cx="82" cy="63" r="5"   fill="#ff5fa2" opacity="0.1"/>

  <!-- Edge connector (gold strip) -->
  <rect x="72" y="88" width="40" height="14" rx="1"
    fill="url(#RAM_edge)"/>
  <!-- Notch in edge connector -->
  <rect x="88" y="88" width="6" height="8" rx="0.5" fill="#0d1527"/>
  <!-- Gold connector glow -->
  <rect x="72" y="88" width="40" height="14" rx="1"
    fill="none" stroke="#ffd857" stroke-width="1.5" opacity="0.55"/>
  <rect x="72" y="88" width="40" height="14" rx="1"
    fill="none" stroke="#ffd857" stroke-width="4"   opacity="0.1"/>
</svg>
