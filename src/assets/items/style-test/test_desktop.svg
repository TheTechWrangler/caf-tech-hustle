<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="DT_case" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#253557"/>
      <stop offset="100%" stop-color="#0d1527"/>
    </linearGradient>
    <linearGradient id="DT_panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2440"/>
      <stop offset="100%" stop-color="#070d1d"/>
    </linearGradient>
  </defs>

  <!-- ── TOP SURFACE (thin strip, mild 3/4) ── -->
  <polygon points="24,10 92,10 102,20 14,20"
    fill="#1e2d4e" stroke="#08111e" stroke-width="2"/>
  <!-- Gold top accent -->
  <line x1="24" y1="10" x2="92" y2="10" stroke="#ffd857" stroke-width="1.5" opacity="0.52"/>

  <!-- ── RIGHT SIDE DEPTH ── -->
  <polygon points="92,10 102,20 102,118 92,118"
    fill="#1a2844" stroke="#08111e" stroke-width="1.5"/>
  <line x1="92" y1="10" x2="92" y2="118" stroke="#253557" stroke-width="1" opacity="0.6"/>

  <!-- ── FRONT FACE ── -->
  <rect x="14" y="20" width="78" height="98" rx="4"
    fill="url(#DT_case)" stroke="#08111e" stroke-width="2.5"/>
  <!-- Front panel inset -->
  <rect x="20" y="26" width="66" height="86" rx="2"
    fill="url(#DT_panel)"/>
  <!-- Cyan accent line at top of panel -->
  <line x1="22" y1="30" x2="82" y2="30" stroke="#2ff8ef" stroke-width="1" opacity="0.42"/>

  <!-- ── USB PORTS (top cluster) ── -->
  <rect x="24" y="35" width="11" height="7" rx="1.5"
    fill="#070d1d" stroke="#1a2844" stroke-width="0.8"/>
  <rect x="38" y="35" width="11" height="7" rx="1.5"
    fill="#070d1d" stroke="#1a2844" stroke-width="0.8"/>

  <!-- ── POWER BUTTON (prominent, upper-right) ── -->
  <!-- Glow -->
  <circle cx="74" cy="39" r="10" fill="#ffd857" opacity="0.14"/>
  <!-- Button ring -->
  <circle cx="74" cy="39" r="8"  fill="#111d35" stroke="#ffd857" stroke-width="1.5"/>
  <!-- Inner lit face -->
  <circle cx="74" cy="39" r="5"  fill="#ffd857" opacity="0.9"/>

  <!-- ── HDD ACTIVITY LED ── -->
  <circle cx="25" cy="56" r="3.5" fill="#2ff8ef" opacity="0.9"/>
  <circle cx="25" cy="56" r="7"   fill="#2ff8ef" opacity="0.13"/>

  <!-- ── OPTICAL DRIVE BAY ── -->
  <rect x="24" y="52" width="60" height="11" rx="2"
    fill="#070d1d" stroke="#1a2844" stroke-width="0.8"/>
  <rect x="26" y="54" width="56" height="7" rx="1" fill="#0a1220"/>
  <!-- Eject notch -->
  <rect x="77" y="56" width="5" height="3" rx="0.5" fill="#1e2d4e"/>

  <!-- ── FRONT VENT GRILLE (lower two-thirds) ── -->
  <rect x="24" y="68" width="60" height="38" rx="2" fill="#070d1d" opacity="0.7"/>
  <line x1="26" y1="73" x2="82" y2="73" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>
  <line x1="26" y1="79" x2="82" y2="79" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>
  <line x1="26" y1="85" x2="82" y2="85" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>
  <line x1="26" y1="91" x2="82" y2="91" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>
  <line x1="26" y1="97" x2="82" y2="97" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>
  <line x1="26" y1="103" x2="82" y2="103" stroke="#1e2d4e" stroke-width="1.5" opacity="0.9"/>

  <!-- ── BOTTOM FOOTER STRIP ── -->
  <rect x="20" y="108" width="66" height="4" rx="2" fill="#0a1220"/>
</svg>
